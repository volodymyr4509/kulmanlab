<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#4A8580"/>
  <!-- Subtle crosshair guides -->
  <line x1="2" y1="16" x2="30" y2="16" stroke="white" stroke-width="0.5" opacity="0.2"/>
  <line x1="16" y1="2" x2="16" y2="30" stroke="white" stroke-width="0.5" opacity="0.2"/>
  <!-- Corner brackets -->
  <path d="M 6,6 H 12 M 6,6 V 12  M 26,6 H 20 M 26,6 V 12  M 6,26 H 12 M 6,26 V 20  M 26,26 H 20 M 26,26 V 20"
        fill="none" stroke="white" stroke-width="2.5" stroke-linecap="square"/>
  <!-- Center crosshair mark -->
  <line x1="13.5" y1="16" x2="18.5" y2="16" stroke="white" stroke-width="1.5" opacity="0.85"/>
  <line x1="16" y1="13.5" x2="16" y2="18.5" stroke="white" stroke-width="1.5" opacity="0.85"/>
</svg>
